<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Admin 試験対策 上級版</title>
<style>
:root {
  --sf-blue: #0176D3;
  --sf-blue-dark: #014486;
  --sf-blue-light: #1B96FF;
  --sf-blue-pale: #D8EDFF;
  --sf-navy: #032D60;
  --sf-teal: #06A59A;
  --sf-green: #2E844A;
  --sf-green-light: #91DB8B;
  --sf-red: #BA0517;
  --sf-red-light: #FEE3E1;
  --sf-yellow: #F9C714;
  --sf-orange: #E56B00;
  --sf-white: #FFFFFF;
  --sf-gray-1: #F3F2F2;
  --sf-gray-2: #DDDBDA;
  --sf-gray-3: #706E6B;
  --sf-gray-4: #514F4D;
  --sf-gray-5: #3E3E3C;
  --sf-text: #181818;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(1,118,211,0.10);
  --shadow-md: 0 4px 24px rgba(1,118,211,0.14);
  --transition: 0.18s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', Meiryo, sans-serif;
  background: var(--sf-gray-1);
  color: var(--sf-text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ===== HEADER ===== */
.app-header {
  background: linear-gradient(135deg, var(--sf-navy) 0%, var(--sf-blue-dark) 60%, var(--sf-blue) 100%);
  color: #fff;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(3,45,96,0.22);
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px 0;
}
.header-logo {
  width: 32px;
  height: 32px;
  background: var(--sf-blue-light);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 18px;
  letter-spacing: -1px;
  flex-shrink: 0;
}
.header-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.3px;
  line-height: 1.2;
}
.header-sub {
  font-size: 10px;
  opacity: 0.7;
  letter-spacing: 0.5px;
}

/* ===== TABS ===== */
.tab-nav {
  display: flex;
  padding: 8px 16px 0;
  gap: 4px;
}
.tab-btn {
  flex: 1;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.65);
  padding: 8px 4px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: var(--transition);
  letter-spacing: 0.3px;
  font-family: inherit;
}
.tab-btn:hover { color: #fff; }
.tab-btn.active {
  color: #fff;
  border-bottom-color: var(--sf-yellow);
}

/* ===== CONTAINER ===== */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px;
}

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.active { display: block; }

/* ===== CARDS ===== */
.card {
  background: var(--sf-white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--sf-navy);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title .icon {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: var(--sf-blue-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

/* ===== STAT STRIP ===== */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.stat-box {
  background: var(--sf-white);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num {
  font-size: 26px;
  font-weight: 800;
  color: var(--sf-blue);
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: var(--sf-gray-3);
  margin-top: 2px;
  letter-spacing: 0.3px;
}
.stat-box.wrong .stat-num { color: var(--sf-red); }
.stat-box.done .stat-num { color: var(--sf-green); }

/* ===== CATEGORY FILTER ===== */
.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.cat-btn {
  background: var(--sf-gray-1);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  padding: 10px 10px;
  font-size: 12px;
  font-family: inherit;
  font-weight: 600;
  color: var(--sf-gray-4);
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  line-height: 1.3;
}
.cat-btn:hover { background: var(--sf-blue-pale); color: var(--sf-blue-dark); }
.cat-btn.selected {
  background: var(--sf-blue);
  color: #fff;
  border-color: var(--sf-blue-dark);
}
.cat-btn.all-btn {
  grid-column: 1 / -1;
  background: var(--sf-navy);
  color: #fff;
}
.cat-btn.all-btn.selected {
  background: var(--sf-blue-light);
  border-color: var(--sf-blue);
}

/* ===== MODE BUTTONS ===== */
.mode-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.mode-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--sf-gray-1);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  padding: 14px 14px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 600;
  color: var(--sf-gray-5);
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  width: 100%;
}
.mode-btn:hover {
  background: var(--sf-blue-pale);
  border-color: var(--sf-blue-light);
  color: var(--sf-blue-dark);
}
.mode-btn .mode-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.mode-btn .mode-info { flex: 1; }
.mode-btn .mode-name { font-size: 14px; font-weight: 700; }
.mode-btn .mode-desc { font-size: 11px; color: var(--sf-gray-3); margin-top: 1px; font-weight: 400; }
.mode-btn.m-order .mode-icon { background: #D8EDFF; }
.mode-btn.m-random .mode-icon { background: #E8F4E8; }
.mode-btn.m-wrong .mode-icon { background: var(--sf-red-light); }
.mode-btn.m-pick .mode-icon { background: #EDE5FF; }

/* ===== START INPUT ===== */
.start-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  padding: 10px 14px;
  background: var(--sf-blue-pale);
  border-radius: var(--radius-sm);
}
.start-row label { font-size: 12px; color: var(--sf-blue-dark); font-weight: 600; }
.start-row input[type="number"] {
  width: 64px;
  border: 1.5px solid var(--sf-blue-light);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 14px;
  font-family: inherit;
  color: var(--sf-text);
  outline: none;
  background: #fff;
}
.start-row input:focus { border-color: var(--sf-blue); }
.btn-start {
  flex: 1;
  background: var(--sf-blue);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
}
.btn-start:hover { background: var(--sf-blue-dark); }

/* ===== PICK MODE ===== */
.pick-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.btn-small {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--sf-blue-light);
  background: var(--sf-white);
  color: var(--sf-blue);
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
}
.btn-small:hover { background: var(--sf-blue-pale); }
.pick-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}
.pick-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--sf-gray-1);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: var(--transition);
}
.pick-item.wrong { background: var(--sf-red-light); border-color: #ffb3ad; }
.pick-item.checked { background: var(--sf-blue-pale); border-color: var(--sf-blue-light); }
.pick-item.wrong.checked { background: #ffd6d4; border-color: var(--sf-red); }
.pick-item input[type="checkbox"] { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; accent-color: var(--sf-blue); }
.pick-item .pick-text { font-size: 12px; line-height: 1.4; }
.pick-item .pick-cat { font-size: 10px; color: var(--sf-gray-3); margin-top: 2px; }
.btn-pick-start {
  width: 100%;
  margin-top: 12px;
  background: var(--sf-blue);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
}
.btn-pick-start:hover { background: var(--sf-blue-dark); }

/* ===== QUIZ SCREEN ===== */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.quiz-progress-label { font-size: 12px; color: var(--sf-gray-3); font-weight: 600; }
.quiz-cat-badge {
  background: var(--sf-blue-pale);
  color: var(--sf-blue-dark);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}
.quiz-progress-bar {
  height: 5px;
  background: var(--sf-gray-2);
  border-radius: 3px;
  margin-bottom: 14px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sf-blue), var(--sf-blue-light));
  border-radius: 3px;
  transition: width 0.3s ease;
}
.quiz-source { font-size: 10px; color: var(--sf-gray-3); margin-bottom: 8px; }
.quiz-question {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.6;
  margin-bottom: 16px;
  color: var(--sf-gray-5);
}
.quiz-multi-hint {
  font-size: 11px;
  color: var(--sf-orange);
  font-weight: 700;
  margin-bottom: 10px;
  background: #FFF3E0;
  padding: 5px 10px;
  border-radius: 6px;
  display: inline-block;
}
.choices-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}
.choice-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--sf-gray-1);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 14px;
  font-family: inherit;
  color: var(--sf-text);
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  width: 100%;
  line-height: 1.5;
}
.choice-btn:hover:not(.disabled) {
  background: var(--sf-blue-pale);
  border-color: var(--sf-blue-light);
}
.choice-btn.selected {
  background: var(--sf-blue-pale);
  border-color: var(--sf-blue);
  color: var(--sf-blue-dark);
}
.choice-btn.correct {
  background: #E3F5E1;
  border-color: var(--sf-green);
  color: var(--sf-green);
}
.choice-btn.incorrect {
  background: var(--sf-red-light);
  border-color: var(--sf-red);
  color: var(--sf-red);
}
.choice-btn.disabled { cursor: default; }
.choice-index {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--sf-gray-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}
.choice-btn.correct .choice-index { background: var(--sf-green); color: #fff; }
.choice-btn.incorrect .choice-index { background: var(--sf-red); color: #fff; }
.choice-btn.selected .choice-index { background: var(--sf-blue); color: #fff; }

/* ===== RESULT BADGE ===== */
.result-badge {
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.result-badge.correct-msg {
  background: #E3F5E1;
  color: var(--sf-green);
  border-left: 4px solid var(--sf-green);
}
.result-badge.incorrect-msg {
  background: var(--sf-red-light);
  color: var(--sf-red);
  border-left: 4px solid var(--sf-red);
}
.explanation-box {
  background: var(--sf-gray-1);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--sf-gray-4);
  margin-bottom: 14px;
}
.exp-correct {
  font-size: 13px;
  line-height: 1.7;
  color: var(--sf-gray-4);
  margin: 0 0 10px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--sf-gray-2);
}
.exp-wrong {
  font-size: 12px;
  line-height: 1.6;
  color: var(--sf-gray-3);
  margin: 6px 0 0 0;
  padding-left: 8px;
  border-left: 3px solid var(--sf-gray-2);
}
.exp-line {
  font-size: 13px;
  line-height: 1.7;
  color: var(--sf-gray-4);
  margin: 4px 0;
}
.explanation-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--sf-blue);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

/* ===== BUTTONS ===== */
.btn-primary {
  display: block;
  width: 100%;
  background: var(--sf-blue);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}
.btn-primary:hover { background: var(--sf-blue-dark); }
.btn-secondary {
  display: block;
  width: 100%;
  background: var(--sf-white);
  color: var(--sf-blue);
  border: 2px solid var(--sf-blue);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}
.btn-secondary:hover { background: var(--sf-blue-pale); }
.btn-multi-submit {
  width: 100%;
  background: var(--sf-teal);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 10px;
}
.btn-multi-submit:hover { background: #04857D; }

/* ===== RESULT SCREEN ===== */
.result-score-ring {
  text-align: center;
  padding: 24px 0 16px;
}
.score-circle {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 8px solid var(--sf-blue-pale);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  position: relative;
}
.score-pct {
  font-size: 28px;
  font-weight: 900;
  color: var(--sf-blue);
  line-height: 1;
}
.score-label { font-size: 11px; color: var(--sf-gray-3); }
.score-fraction {
  font-size: 13px;
  color: var(--sf-gray-4);
  font-weight: 600;
}
.result-pass {
  display: inline-block;
  background: var(--sf-green-light);
  color: var(--sf-green);
  font-size: 13px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 20px;
  margin-bottom: 4px;
}
.result-fail {
  display: inline-block;
  background: var(--sf-red-light);
  color: var(--sf-red);
  font-size: 13px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 20px;
  margin-bottom: 4px;
}
.result-buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 16px;
}

/* ===== WRONG REVIEW TAB ===== */
.wrong-list { display: flex; flex-direction: column; gap: 8px; }
.wrong-item {
  background: var(--sf-white);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--sf-red);
}
.wrong-item-q {
  font-size: 13px;
  font-weight: 600;
  color: var(--sf-gray-5);
  margin-bottom: 4px;
}
.wrong-item-meta {
  font-size: 11px;
  color: var(--sf-gray-3);
}
.wrong-count-badge {
  background: var(--sf-red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  margin-left: 6px;
}
.btn-clear-all {
  width: 100%;
  background: var(--sf-white);
  color: var(--sf-red);
  border: 2px solid var(--sf-red);
  border-radius: var(--radius-sm);
  padding: 11px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
  margin-top: 12px;
}
.btn-clear-all:hover { background: var(--sf-red-light); }
.empty-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--sf-gray-3);
}
.empty-msg .empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-msg p { font-size: 14px; }

/* ===== QUIZ BACK BTN ===== */
.btn-back {
  background: transparent;
  border: none;
  color: var(--sf-blue);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0;
  margin-bottom: 14px;
}
.btn-back:hover { color: var(--sf-blue-dark); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sf-gray-2); border-radius: 3px; }

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeIn 0.22s ease; }

/* ===== UTILITY ===== */
.hidden { display: none !important; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">SF</div>
    <div>
      <div class="header-title">Salesforce Admin 試験対策 <span style="color:var(--sf-yellow);font-size:11px;font-weight:700;background:rgba(255,255,255,0.15);padding:2px 7px;border-radius:10px;margin-left:4px;">上級版 354問</span></div>
      <div class="header-sub">Platform Administrator Certification</div>
    </div>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="showTab('home')">🏠 ホーム</button>
    <button class="tab-btn" onclick="showTab('quiz')">📝 演習中</button>
    <button class="tab-btn" onclick="showTab('review')">❌ 復習</button>
  </nav>
</header>

<main class="container">

  <!-- ===== HOME SCREEN ===== -->
  <div id="screen-home" class="screen active">

    <div class="stat-strip">
      <div class="stat-box">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">全問題数</div>
      </div>
      <div class="stat-box wrong">
        <div class="stat-num" id="stat-wrong">0</div>
        <div class="stat-label">間違い</div>
      </div>
      <div class="stat-box done">
        <div class="stat-num" id="stat-answered">0</div>
        <div class="stat-label">回答済</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">📂</span>カテゴリで絞り込み</div>
      <div class="category-grid" id="category-grid">
        <button class="cat-btn all-btn selected" data-cat="">すべて</button>
        <button class="cat-btn" data-cat="設定とセットアップ">設定とセットアップ</button>
        <button class="cat-btn" data-cat="データ管理&amp;分析">データ管理&amp;分析</button>
        <button class="cat-btn" data-cat="自動化">自動化</button>
        <button class="cat-btn" data-cat="オブジェクトマネージャーとLightningアプリケーションビルダー">オブジェクトマネージャー & LightningAB</button>
        <button class="cat-btn" data-cat="サービス&amp;サポートアプリケーション">サービス&amp;サポート</button>
        <button class="cat-btn" data-cat="セールス&amp;マーケティングアプリケーション">セールス&amp;マーケティング</button>
        <button class="cat-btn" data-cat="Agentforce">Agentforce</button>
        <button class="cat-btn" data-cat="生産性向上とコラボレーション">生産性向上&amp;コラボレーション</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🎯</span>演習モード</div>
      <div class="mode-list">

        <button class="mode-btn m-order" onclick="startMode('order')">
          <div class="mode-icon">📋</div>
          <div class="mode-info">
            <div class="mode-name">順番に解く</div>
            <div class="mode-desc">ID順に出題、開始番号を指定可能</div>
          </div>
        </button>
        <div class="start-row hidden" id="order-start-row">
          <label>開始番号：</label>
          <input type="number" id="order-start-num" value="1" min="1">
          <button class="btn-start" onclick="launchOrder()">開始</button>
        </div>

        <button class="mode-btn m-random" onclick="startMode('random')">
          <div class="mode-icon">🔀</div>
          <div class="mode-info">
            <div class="mode-name">ランダム</div>
            <div class="mode-desc">全問題をシャッフルして出題</div>
          </div>
        </button>

        <button class="mode-btn m-wrong" onclick="startMode('wrong')">
          <div class="mode-icon">❌</div>
          <div class="mode-info">
            <div class="mode-name">間違えた問題</div>
            <div class="mode-desc">苦手な問題を集中練習</div>
          </div>
        </button>

        <button class="mode-btn m-pick" onclick="startMode('pick')">
          <div class="mode-icon">✅</div>
          <div class="mode-info">
            <div class="mode-name">ピックモード</div>
            <div class="mode-desc">問題一覧から任意の問題を選択</div>
          </div>
        </button>

      </div>
    </div>

    <!-- PICK MODE PANEL -->
    <div class="card hidden" id="pick-panel">
      <div class="card-title"><span class="icon">✅</span>出題する問題を選択</div>
      <div class="pick-controls">
        <button class="btn-small" onclick="pickAll()">全選択</button>
        <button class="btn-small" onclick="pickNone()">全解除</button>
      </div>
      <div class="pick-list" id="pick-list"></div>
      <button class="btn-pick-start" onclick="launchPick()">選択した問題で開始</button>
    </div>

  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div id="screen-quiz" class="screen">

    <div class="card" id="quiz-card">
      <button class="btn-back" onclick="goHome()">← ホームに戻る</button>
      <div class="quiz-header">
        <span class="quiz-progress-label" id="quiz-progress">1 / 10</span>
        <span class="quiz-cat-badge" id="quiz-cat-badge">カテゴリ</span>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quiz-progress-fill" style="width:0%"></div>
      </div>
      <div class="quiz-source" id="quiz-source"></div>
      <div class="quiz-question" id="quiz-question"></div>
      <div class="quiz-multi-hint hidden" id="quiz-multi-hint">※ 複数選択してください</div>
      <div class="choices-list" id="choices-list"></div>
      <button class="btn-multi-submit hidden" id="btn-multi-submit" onclick="submitMulti()">回答する</button>

      <!-- Result section (hidden until answered) -->
      <div class="hidden" id="quiz-result-section">
        <div class="result-badge" id="result-badge"></div>
        <div class="explanation-box">
          <div class="explanation-label">解説</div>
          <div id="quiz-explanation"></div>
        </div>
        <button class="btn-primary" id="btn-next" onclick="nextQuestion()">次の問題 →</button>
      </div>
    </div>

  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div id="screen-result" class="screen">
    <div class="card">
      <div class="result-score-ring">
        <div class="score-circle">
          <div class="score-pct" id="res-pct">0%</div>
          <div class="score-label">正答率</div>
        </div>
        <div class="score-fraction" id="res-fraction">0 / 0 問正解</div>
        <div class="mt-8" id="res-verdict"></div>
      </div>
      <div class="result-buttons">
        <button class="btn-primary" onclick="retryQuiz()">🔁 もう一度</button>
        <button class="btn-secondary" onclick="goHome()">🏠 ホームに戻る</button>
      </div>
    </div>

    <div class="card" id="result-wrong-section">
      <div class="card-title"><span class="icon">❌</span>間違えた問題</div>
      <div class="wrong-list" id="result-wrong-list"></div>
    </div>
  </div>

  <!-- ===== REVIEW SCREEN ===== -->
  <div id="screen-review" class="screen">
    <div class="card">
      <div class="card-title"><span class="icon">❌</span>間違えた問題リスト <span id="wrong-total-badge"></span></div>
      <div id="review-content"></div>
    </div>
  </div>

</main>

<script src="questions_all.js"></script>
<script>
// ========================================
// STATE
// ========================================
var WRONG_KEY = 'sf_wrong_list_adv';
var ANSWERED_KEY = 'sf_answered_list_adv';

var state = {
  selectedCat: '',
  currentMode: '',
  quizQueue: [],
  quizIndex: 0,
  quizScore: 0,
  quizWrongIds: [],
  selectedChoices: [],
  answered: false,
  retryQueue: []
};

// ========================================
// STORAGE HELPERS
// ========================================
function loadWrongList() {
  try {
    var raw = localStorage.getItem(WRONG_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveWrongList(obj) {
  try { localStorage.setItem(WRONG_KEY, JSON.stringify(obj)); } catch(e) {}
}

function addWrong(id) {
  var list = loadWrongList();
  list[id] = (list[id] || 0) + 1;
  saveWrongList(list);
}

function removeWrong(id) {
  var list = loadWrongList();
  delete list[id];
  saveWrongList(list);
}

function loadAnsweredList() {
  try {
    var raw = localStorage.getItem(ANSWERED_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function addAnswered(id) {
  var answered = loadAnsweredList();
  answered[id] = true;
  try { localStorage.setItem(ANSWERED_KEY, JSON.stringify(answered)); } catch(e) {}
}

// ========================================
// TABS & SCREEN SWITCHING
// ========================================
function showTab(tab) {
  var tabMap = { home: 'screen-home', quiz: 'screen-quiz', review: 'screen-review' };
  var screenId = tabMap[tab];
  
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  
  var tabBtns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove('active');
  
  document.getElementById(screenId).classList.add('active');
  tabBtns[['home','quiz','review'].indexOf(tab)].classList.add('active');
  
  if (tab === 'review') renderReview();
  if (tab === 'home') updateStats();
}

// ========================================
// STATS
// ========================================
function updateStats() {
  var wrong = loadWrongList();
  var answered = loadAnsweredList();
  document.getElementById('stat-total').textContent = QUESTIONS.length;
  document.getElementById('stat-wrong').textContent = Object.keys(wrong).length;
  document.getElementById('stat-answered').textContent = Object.keys(answered).length;
}

// ========================================
// CATEGORY FILTER
// ========================================
document.getElementById('category-grid').addEventListener('click', function(e) {
  var btn = e.target.closest('.cat-btn');
  if (!btn) return;
  
  var catBtns = document.querySelectorAll('.cat-btn');
  for (var i = 0; i < catBtns.length; i++) catBtns[i].classList.remove('selected');
  btn.classList.add('selected');
  state.selectedCat = btn.getAttribute('data-cat');
  
  // Update pick list if visible
  var pickPanel = document.getElementById('pick-panel');
  if (!pickPanel.classList.contains('hidden')) {
    renderPickList();
  }
});

function getFilteredQuestions() {
  if (!state.selectedCat) return QUESTIONS.slice();
  return QUESTIONS.filter(function(q) { return q.category === state.selectedCat; });
}

// ========================================
// MODE SELECTION
// ========================================
function startMode(mode) {
  // Hide order start row first
  document.getElementById('order-start-row').classList.add('hidden');
  document.getElementById('pick-panel').classList.add('hidden');
  
  if (mode === 'order') {
    var maxId = getFilteredQuestions().length;
    document.getElementById('order-start-num').max = maxId;
    document.getElementById('order-start-row').classList.remove('hidden');
    return;
  }
  if (mode === 'pick') {
    renderPickList();
    document.getElementById('pick-panel').classList.remove('hidden');
    return;
  }
  if (mode === 'random') {
    var qs = getFilteredQuestions();
    launchQuiz(shuffle(qs));
    return;
  }
  if (mode === 'wrong') {
    var wrong = loadWrongList();
    var wrongIds = Object.keys(wrong).map(Number);
    var qs = QUESTIONS.filter(function(q) { return wrongIds.indexOf(q.id) !== -1; });
    if (qs.length === 0) {
      alert('間違えた問題がありません！');
      return;
    }
    launchQuiz(shuffle(qs));
    return;
  }

}

function launchOrder() {
  var startNum = parseInt(document.getElementById('order-start-num').value) || 1;
  var qs = getFilteredQuestions();
  var startIdx = 0;
  for (var i = 0; i < qs.length; i++) {
    if (qs[i].id >= startNum) { startIdx = i; break; }
  }
  launchQuiz(qs.slice(startIdx));
}

// ========================================
// PICK MODE
// ========================================
function renderPickList() {
  var qs = getFilteredQuestions();
  var wrong = loadWrongList();
  var html = '';
  for (var i = 0; i < qs.length; i++) {
    var q = qs[i];
    var isWrong = wrong[q.id] ? 'wrong' : '';
    html += '<div class="pick-item ' + isWrong + '" data-id="' + q.id + '" onclick="togglePick(this)">' +
      '<input type="checkbox" onclick="event.stopPropagation()" onchange="syncCheck(this)">' +
      '<div><div class="pick-text">' + q.id + '. ' + truncate(q.question, 60) + '</div>' +
      '<div class="pick-cat">' + q.category + (wrong[q.id] ? ' ｜ 間違い×' + wrong[q.id] : '') + '</div></div>' +
      '</div>';
  }
  document.getElementById('pick-list').innerHTML = html;
}

function togglePick(el) {
  el.classList.toggle('checked');
  var cb = el.querySelector('input[type="checkbox"]');
  cb.checked = el.classList.contains('checked');
}

function syncCheck(cb) {
  var item = cb.closest('.pick-item');
  if (cb.checked) item.classList.add('checked');
  else item.classList.remove('checked');
}

function pickAll() {
  var items = document.querySelectorAll('.pick-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.add('checked');
    items[i].querySelector('input[type="checkbox"]').checked = true;
  }
}

function pickNone() {
  var items = document.querySelectorAll('.pick-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove('checked');
    items[i].querySelector('input[type="checkbox"]').checked = false;
  }
}

function launchPick() {
  var items = document.querySelectorAll('.pick-item.checked');
  if (items.length === 0) { alert('問題を選択してください'); return; }
  var ids = [];
  for (var i = 0; i < items.length; i++) {
    ids.push(parseInt(items[i].getAttribute('data-id')));
  }
  var qs = QUESTIONS.filter(function(q) { return ids.indexOf(q.id) !== -1; });
  launchQuiz(qs);
}

// ========================================
// QUIZ ENGINE
// ========================================
function launchQuiz(qs) {
  if (qs.length === 0) { alert('出題できる問題がありません'); return; }
  state.quizQueue = qs;
  state.quizIndex = 0;
  state.quizScore = 0;
  state.quizWrongIds = [];
  state.retryQueue = qs.slice();
  
  document.getElementById('pick-panel').classList.add('hidden');
  document.getElementById('order-start-row').classList.add('hidden');
  
  showTab('quiz');
  renderQuestion();
}

function renderQuestion() {
  var q = state.quizQueue[state.quizIndex];
  var total = state.quizQueue.length;
  var current = state.quizIndex + 1;
  state.answered = false;
  state.selectedChoices = [];
  
  // Progress
  document.getElementById('quiz-progress').textContent = current + ' / ' + total;
  document.getElementById('quiz-cat-badge').textContent = q.category;
  var pct = (current - 1) / total * 100;
  document.getElementById('quiz-progress-fill').style.width = pct + '%';
  document.getElementById('quiz-source').textContent = q.source;
  document.getElementById('quiz-question').textContent = q.question;
  
  // Multi-select hint
  var isMulti = q.answers.length > 1;
  var hint = document.getElementById('quiz-multi-hint');
  if (isMulti) {
    hint.textContent = '※ ' + q.answers.length + ' つ選択してください';
    hint.classList.remove('hidden');
  } else {
    hint.classList.add('hidden');
  }
  
  // Choices
  var choicesHtml = '';
  var labels = ['A', 'B', 'C', 'D', 'E', 'F'];
  for (var i = 0; i < q.choices.length; i++) {
    choicesHtml += '<button class="choice-btn" data-idx="' + i + '">' +
      '<span class="choice-index">' + labels[i] + '</span>' +
      '<span>' + q.choices[i] + '</span></button>';
  }
  document.getElementById('choices-list').innerHTML = choicesHtml;
  
  // Multi submit
  var multiBtn = document.getElementById('btn-multi-submit');
  if (isMulti) multiBtn.classList.remove('hidden');
  else multiBtn.classList.add('hidden');
  
  // Hide result
  document.getElementById('quiz-result-section').classList.add('hidden');
  document.getElementById('result-badge').className = 'result-badge';
  document.getElementById('result-badge').textContent = '';
}

// Event delegation for choices
document.getElementById('choices-list').addEventListener('click', function(e) {
  var btn = e.target.closest('.choice-btn');
  if (!btn || btn.classList.contains('disabled')) return;
  
  var q = state.quizQueue[state.quizIndex];
  var isMulti = q.answers.length > 1;
  var idx = parseInt(btn.getAttribute('data-idx'));
  
  if (!isMulti) {
    // Single select: auto submit
    state.selectedChoices = [idx];
    evaluateAnswer();
  } else {
    // Multi select: toggle
    var pos = state.selectedChoices.indexOf(idx);
    if (pos === -1) {
      state.selectedChoices.push(idx);
      btn.classList.add('selected');
    } else {
      state.selectedChoices.splice(pos, 1);
      btn.classList.remove('selected');
    }
  }
});

function submitMulti() {
  if (state.answered) return;
  if (state.selectedChoices.length === 0) { alert('選択肢を選んでください'); return; }
  evaluateAnswer();
}

function evaluateAnswer() {
  if (state.answered) return;
  state.answered = true;
  
  var q = state.quizQueue[state.quizIndex];
  var correctSet = q.answers.slice().sort().join(',');
  var selectedSet = state.selectedChoices.slice().sort().join(',');
  var isCorrect = correctSet === selectedSet;
  
  // Highlight choices
  var btns = document.querySelectorAll('.choice-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.add('disabled');
    var idx = parseInt(btns[i].getAttribute('data-idx'));
    var isAnswer = q.answers.indexOf(idx) !== -1;
    var isSelected = state.selectedChoices.indexOf(idx) !== -1;
    
    if (isAnswer) btns[i].classList.add('correct');
    else if (isSelected && !isAnswer) btns[i].classList.add('incorrect');
  }
  
  // Record
  addAnswered(q.id);
  if (!isCorrect) {
    addWrong(q.id);
    state.quizWrongIds.push(q.id);
  } else {
    state.quizScore++;
    // Remove from wrong if was wrong and now correct
    // (keep history for review)
  }
  
  // Show result
  var badge = document.getElementById('result-badge');
  if (isCorrect) {
    badge.className = 'result-badge correct-msg';
    badge.innerHTML = '✅ 正解！';
  } else {
    badge.className = 'result-badge incorrect-msg';
    badge.innerHTML = '❌ 不正解';
  }
  
  var expLines = q.explanation.split('\n');
  var expHtml = '';
  var nonEmpty = expLines.filter(function(l){return l.trim();});
  for (var ei = 0; ei < expLines.length; ei++) {
    var line = expLines[ei].trim();
    if (!line) continue;
    if (ei === 0 && nonEmpty.length > 1 && line.indexOf('※') !== 0) {
      expHtml += '<p class="exp-correct">' + line + '</p>';
    } else if (line.indexOf('※') === 0) {
      expHtml += '<p class="exp-wrong">' + line + '</p>';
    } else {
      expHtml += '<p class="exp-line">' + line + '</p>';
    }
  }
  document.getElementById('quiz-explanation').innerHTML = expHtml;
  document.getElementById('quiz-result-section').classList.remove('hidden');
  document.getElementById('btn-multi-submit').classList.add('hidden');
  
  // Update btn-next label
  var isLast = state.quizIndex >= state.quizQueue.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '結果を見る' : '次の問題 →';
}

function nextQuestion() {
  state.quizIndex++;
  if (state.quizIndex >= state.quizQueue.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ========================================
// RESULT
// ========================================
function showResult() {
  var total = state.quizQueue.length;
  var score = state.quizScore;
  var pct = total > 0 ? Math.round(score / total * 100) : 0;
  
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-fraction').textContent = score + ' / ' + total + ' 問正解';
  
  var verdict = document.getElementById('res-verdict');
  if (pct >= 67) {
    verdict.innerHTML = '<span class="result-pass">🎉 合格ライン達成！</span>';
  } else {
    verdict.innerHTML = '<span class="result-fail">📚 もう少し復習が必要です</span>';
  }
  
  // Wrong items from this session
  var wrongSection = document.getElementById('result-wrong-section');
  var wrongHtml = '';
  if (state.quizWrongIds.length > 0) {
    var wrongData = loadWrongList();
    for (var i = 0; i < state.quizWrongIds.length; i++) {
      var id = state.quizWrongIds[i];
      var q = QUESTIONS.find(function(q) { return q.id === id; });
      if (q) {
        wrongHtml += '<div class="wrong-item">' +
          '<div class="wrong-item-q">' + q.id + '. ' + truncate(q.question, 80) + '</div>' +
          '<div class="wrong-item-meta">' + q.category + ' | 累計間違い×' + (wrongData[id] || 1) + '</div>' +
          '</div>';
      }
    }
    wrongSection.classList.remove('hidden');
  } else {
    wrongSection.classList.add('hidden');
  }
  document.getElementById('result-wrong-list').innerHTML = wrongHtml || '';
  
  // Switch to result tab (show screen directly)
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  var tabBtns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove('active');
  
  document.getElementById('screen-result').classList.add('active');
  updateStats();
}

function retryQuiz() {
  launchQuiz(shuffle(state.retryQueue));
}

// ========================================
// REVIEW
// ========================================
function renderReview() {
  var wrong = loadWrongList();
  var ids = Object.keys(wrong).map(Number);
  var container = document.getElementById('review-content');
  var badge = document.getElementById('wrong-total-badge');
  
  if (ids.length === 0) {
    badge.innerHTML = '';
    container.innerHTML = '<div class="empty-msg"><div class="empty-icon">🎉</div><p>間違えた問題はありません！<br>素晴らしい！</p></div>';
    return;
  }
  
  badge.innerHTML = '<span class="wrong-count-badge">' + ids.length + '</span>';
  
  var html = '<div class="wrong-list">';
  ids.sort(function(a, b) { return b - a; }); // most wrong first by id
  // Sort by mistake count
  ids.sort(function(a, b) { return (wrong[b] || 0) - (wrong[a] || 0); });
  
  for (var i = 0; i < ids.length; i++) {
    var id = ids[i];
    var q = QUESTIONS.find(function(q) { return q.id === id; });
    if (!q) continue;
    html += '<div class="wrong-item">' +
      '<div class="wrong-item-q">' + q.id + '. ' + truncate(q.question, 80) + '</div>' +
      '<div class="wrong-item-meta">' + q.category + ' ｜ 間違い×' + wrong[id] +
      '</div></div>';
  }
  html += '</div>';
  html += '<button class="btn-clear-all" onclick="clearAll()">🗑 間違いリストを全クリア</button>';
  
  container.innerHTML = html;
}

function clearAll() {
  if (!confirm('間違いリストを全てクリアしますか？')) return;
  localStorage.removeItem(WRONG_KEY);
  updateStats();
  renderReview();
}

// ========================================
// NAVIGATION
// ========================================
function goHome() {
  showTab('home');
  updateStats();
}

// ========================================
// UTILS
// ========================================
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '…' : str;
}

// ========================================
// INIT
// ========================================
updateStats();
</script>
</body>
